<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
            /* CSS */
            body {
           font-family: Arial, sans-serif;
           text-align: center;
           background: #111;
           color: white;
           margin: 0;
           padding: 20px;
       }
       input, button {
           padding: 12px;
           margin: 10px;
           font-size: 16px;
           border: none;
           border-radius: 8px;
       }
       button {
           background: #4CAF50;
           color: white;
           cursor: pointer;
       }
       button:hover {
           background: #45a049;
       }
       #gameBox {
           margin-top: 20px;
           max-width: 600px;
           margin-left: auto;
           margin-right: auto;
       }
       #dodgeGame {
           display: none;
           width: 100%;
           max-width: 800px;
           height: 500px;
           background: #000;
           margin: 30px auto;
           border-radius: 16px;
           border: 3px solid #444;
           position: relative;
       }
       #score {
           font-size: 24px;
           font-weight: bold;
           margin: 20px 0;
       }

        </style>

        <title>Challenge Game - Wrong Answer + Dodge</title>
    </head>
    <body>
        <!-- HTML -->
         <!-- Main heading for the game -->
         <h1>Wrong Answers Only Game</h1>

        <!-- Game rules -->
        <ul> <strong>Rules:</strong> Answer <em>WRONG ONLY</em>. </ul>
            <ul> Answer with the correct answer = Lose.</ul>
            <ul> Answer with the wrong answer, then: </ul>
            <ul> dodge 10 blocks to go to the next round! </ul>

        <!-- Score display -->
         <div id="score">Score: 0</div>

        <!-- Main game container -->
        <div id="gameBox">
            <!-- Question displayed here -->
            <p id="question" style="font-size: 24px; margin: 20px 0;"></p>

              <!-- Input field for player to type their WRONG answer -->
            <input type="text" id="answer" placeholder="Enter WRONG answer here">

            <br>
             <!-- Button to submit the answer -->
            <button id="submit">Submit Answer</button>

             <!-- Timer display -->
            <p id="timer" style="font-size: 20px; color: #ff9800;"></p>

             <!-- Result of the answer submission (correct/wrong) will be shown here -->
            <p id="result"></p>

      </div>

  <!-- Dodge game section -->
   <div id="dodgeGame">
        <!-- Instruction at the top of dodge game -->
       <div style="position: absolute; top: 10px; left: 20px; color: white; font-size: 18px; z-index: 100;">
           Dodge 10 red blocks to continue!
       </div>
   </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <!-- <script src="script.js"></script> -->
        <script type="module">
            // JS
             import kaboom from "https://unpkg.com/kaboom@3000.0.0/dist/kaboom.mjs"


            // === QUIZ GAME ===

            // Select DOM elements for manipulation
            const questionEl = document.querySelector("#question")
            const inputEl = document.querySelector("#answer")
            const submitBtn = document.querySelector("#submit")
            const timerEl = document.querySelector("#timer")
            const resultEl = document.querySelector("#result")
            const dodgeGameEl = document.querySelector("#dodgeGame")
            const scoreEl = document.querySelector("#score")


            // Array of question objects for the quiz
            // Each object has:
            // - q: the question text
            // - a: the correct answer
            // - type: the expected type of answer (number in this case)
            const questions = [
                { q: "What is 4 + 4?", a: 8, type: "number" },
                { q: "What is 9 - 2?", a: 7, type: "number" },
                { q: "What is 3 x 3?", a: 9, type: "number" },
                { q: "What is 15 / 3?", a: 5, type: "number" }
            ]

                let currentIndex = 0  // which question we're on
                let timeLeft = 3      // how much time left for this question
                let timer             // stores the countdown timer so we can stop it
                let score = 0         // player's score


                function updateScore() {
                    scoreEl.innerHTML = "Score:" + score   // shows the score
                }


                function startGame() {
                    currentIndex = 0  // go back to first question
                    score = 0         // reset score
                    updateScore()     // show score on screen
                    loadQuestion()    // show the first question
                }


                function loadQuestion() {
                    //
                    clearInterval(timer) // stop the old timer

                    timeLeft = 3        // reset time for different question

                    let current = questions[currentIndex] // egt the question we're on


                    questionEl.innerHTML = current.q     // show the question
                    inputEl.innerHTML = ""                       // clear answer box
                    resultEl.innerHTML = ""                      // clear old results
                    timerEl.innerHTML = "Time: " + timeLeft      // show timer


                    //  Start NEW timer
                    timer = setInterval(()=> {
                        timeLeft--                 // count down by 1 second
                        timerEl.innerHTML = "Time: " + timeLeft


                        if (timeLeft <= 0) {         // if time's up
                            clearInterval(timer);    // stop the timer
                            alert("Time ran out!");   // call the lose function
                        }
                    }, 1000);
                }


                // when you click the submit button
                submitBtn.addEventListener("click", () => {
                // grab what the player typed
                let str = inputEl.value

                // remove spaces that are in the front
                let start = 0;
                while (str[start] === " ") {
                    start++
                }

                // remove spaces that are in the end
                let end = str.length;
                while (str[end - 1] === " ") {
                    end--
                }

                // trimmed input from the user
                let userInput = str.slice(start, end)
                // grab the current question info
                let current = questions[currentIndex]


                 // check if it's supposed to be a number
                if (current.type === "number") {
                     // if it's empty or not a number, alert to type a real number
                    if (userInput === "" || isNaN(userInput)) {
                        alert("Enter a valid number!")
                        return
                    }
                }

                 // turn the input into a number
                let answer = Number(userInput)
                // stop the timer because they answered
                clearInterval(timer)


                // if they actually typed the right answer, they lose
                if (answer === current.a) {
               lose("Correct answer... you lose!")
               return
           }

            // they got it wrong, add 2 points
            score += 2
           updateScore()
           // if they answer with a wrong answer
           resultEl.innerHTML = "Wrong! Good job (+2 points) - Now dodge 10 blocks!";


           // start the dodge game
            // this code runs after user finishes dodging
           startDodgeGame(() => {
                // go to the next question
               currentIndex++

               // if no questions left, they win
               if (currentIndex >= questions.length) {
                   win()
                // otherwise, show the next question
               } else {
                   setTimeout(loadQuestion, 500)
               }
           })
       })

       // what happens when they lose
        function lose(message) {
           alert(message) // show the message
           location.reload()  // restart the game
       }

       // what happens when they win
       function win() {
           alert("You survived all questions! Final Score: " + score)  // show the win message and score
           location.reload() // restart the game
       }


       // === DODGE GAME ===
        function startDodgeGame(afterQuestion) {
        dodgeGameEl.style.display = "block"  // show the dodge game container

        const k = kaboom({ // start Kaboom.js
            width: Math.min(800, window.innerWidth - 40), // canvas width fits screen max 800
            height: 500, // fixed canvas height
            root: dodgeGameEl,
            canvas: document.createElement("canvas"), // create new canvas element
            debug: true,
            background: [10, 10, 30] // dark blue background
        })

        dodgeGameEl.appendChild(k.canvas) // add canvas to the HTML
        k.canvas.focus() // focus so keyboard controls work

        const PLAYER_SPEED = 280  // how fast player moves
        const ENEMY_SPEED = 320  // how fast enemies fall
        const WIN_GOAL = 10     // how many blocks to dodge to win
        let dodged = 0         // start with 0 dodged
        let gameOver = false   // stops game when true


        const player = k.add([ // create the player
            k.rect(40, 40), // square
            k.color(0, 140, 255), // blue color
            k.pos(k.width() / 2, k.height() - 80), // start near bottom center
            k.area(),   // make it collide with enemies
            k.anchor("center"),
            "player"  // tag for collision events
        ])

        const dodgedCounter = k.add([   // text counter for dodged blocks
        k.text(`Dodged: 0`, { size: 20 }),  // start at 0
        k.pos(k.width() / 2, 30),   // top center of screen
        k.anchor("center"),       // center alignment
        k.color(255, 255, 255)   // white text
    ])

    function updateDodgedCounter() {  // updates the counter
        dodgedCounter.text = `Dodged: ${dodged}`  // display current dodged number
    }


    onKeyDown("left", () => {  // move left while holding left arrow
        if (!gameOver) player.move(-PLAYER_SPEED, 0);
    })
    onKeyDown("right", () => { // move right while holding right arrow
        if (!gameOver) player.move(PLAYER_SPEED, 0);
    })
    onKeyDown("up", () => { // move up while holding up arrow
        if (!gameOver) player.move(0, -PLAYER_SPEED);
    })
    onKeyDown("down", () => { // move down while holding down arrow
        if (!gameOver) player.move(0, PLAYER_SPEED);
    })


    function spawnEnemy() {
        if (gameOver) return;
        k.add([
            k.rect(40, 40),
            k.color(255, 0, 0),
            k.pos(k.rand(40, k.width() - 40), -40),
            k.area(),
            k.move(k.vec2(0, 1), ENEMY_SPEED),
            k.offscreen({ destroy: true }),
            "enemy"
        ])
    }

    k.loop(0.7, spawnEnemy)

    k.on("destroy", "enemy", () => {
        if (gameOver) return
        dodged++;
        updateDodgedCounter()
        if (dodged >= WIN_GOAL) {
            gameOver = true;
            k.add([
                k.text(" WIN! Next Question...", { size: 28 }),
                k.pos(k.center()),
                k.anchor("center"),
                k.color(50, 255, 50)
            ])


             setTimeout(() => {
                k.destroyAll()
                dodgeGameEl.style.display = "none"
                afterQuestion()
            }, 1500)
        }
    })


    player.onCollide("enemy", (enemy) => {
        if (gameOver) return
        k.destroy(enemy)
        gameOver = true
        k.add([
            k.text("GAME OVER", { size: 32 }),
            k.pos(k.center()),
            k.anchor("center"),
            k.color(255, 50, 50)
        ]);
        setTimeout(() => location.reload(), 2000)
    })
}

    // Start the game
    startGame()
        </script>
    </body>
</html>
